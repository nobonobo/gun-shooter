<!doctype html>
<html data-theme="cerberus">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	%sveltekit.head%
	<script src="%sveltekit.assets%/wasm_exec.js"></script>
	<script type="module">
		navigator.locks.request('wasm-load', async lock => {
			const go = new Go();
			const { instance, module } = await WebAssembly.instantiateStreaming(
				fetch("%sveltekit.assets%/main.wasm"),
				go.importObject
			);
			go.run(instance);
			globalThis.Go = instance;
			instance.exports.wasmLoaded();
		});
	</script>
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
